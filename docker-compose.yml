services:

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: geoloc
      POSTGRES_USER: geoloc
      POSTGRES_PASSWORD: geoloc2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoloc"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DB_HOST: db
      DB_NAME: geoloc
      DB_USER: geoloc
      DB_PASSWORD: geoloc2024
      DB_PORT: 5432
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
